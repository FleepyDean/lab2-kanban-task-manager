<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Task Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Task Board <span id="task-counter">0</span></h1>
        
        <div class="filter-container">
            <label for="priority-filter">Priority:</label>
            <select id="priority-filter">
                <option value="all">All</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>
        </div>
    </header>
    <main class="board">
        <section id="todo" class="column">
            <h2>To Do</h2>
            <ul id="todo-list" class="task-list"></ul>
            <button class="add-task-btn" data-target="todo-list">Add Task</button>
        </section>

        <section id="inprogress" class="column">
            <h2>In Progress</h2>
            <ul id="inprogress-list" class="task-list"></ul>
            <button class="add-task-btn" data-target="inprogress-list">Add Task</button>
        </section>

        <section id="done" class="column">
            <h2>Done</h2>
            <ul id="done-list" class="task-list"></ul>
            <button class="add-task-btn" data-target="done-list">Add Task</button>
            <button id="clear-done-btn">Clear All</button>
        </section>
    </main>
</body>
</html>
