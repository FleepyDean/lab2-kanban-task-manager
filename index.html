<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kanban Task Board</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Task Board <span id="task-counter">0</span></h1>
        
        <div class="filter-container">
            <label for="priority-filter">Priority:</label>
            <select id="priority-filter">
                <option value="all">All</option>
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>
        </div>
    </header>

    <main class="board">
        <section id="todo" class="column">
            <h2>To Do</h2>
            <ul id="todo-list" class="task-list"></ul>
            <button class="add-task-btn" data-target="todo-list">Add Task</button>
        </section>

        <section id="inprogress" class="column">
            <h2>In Progress</h2>
            <ul id="inprogress-list" class="task-list"></ul>
            <button class="add-task-btn" data-target="inprogress-list">Add Task</button>
        </section>

        <section id="done" class="column">
            <h2>Done</h2>
            <ul id="done-list" class="task-list"></ul>
            <button class="add-task-btn" data-target="done-list">Add Task</button>
            <button id="clear-done-btn">Clear All</button>
        </section>
    </main>

    <div id="task-modal" class="modal hidden">
        <div class="modal-content">
            <h3 id="modal-title">Manage Task</h3>
            
            <input type="text" id="task-title-input" placeholder="Task Title" required>
            <textarea id="task-desc-input" placeholder="Task Description"></textarea>
            
            <select id="task-priority-input">
                <option value="high">High</option>
                <option value="medium">Medium</option>
                <option value="low">Low</option>
            </select>
            
            <input type="date" id="task-date-input">
            
            <input type="hidden" id="current-column-id">
            <input type="hidden" id="current-task-id">
            
            <div class="modal-actions">
                <button id="save-task-btn">Save</button>
                <button id="cancel-task-btn">Cancel</button>
            </div>
        </div>
    </div>

    <script src="taskmanager.js"></script>
</body>
</html>
